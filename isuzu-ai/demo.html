<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Izusu ai - Preview</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Inter', sans-serif; background: #F8F8F8; }
    .gold-glow { box-shadow: 0 0 20px rgba(212,175,55,0.3), 0 0 40px rgba(212,175,55,0.1); }
    .violet-glow { box-shadow: 0 0 20px rgba(124,58,237,0.3), 0 0 40px rgba(124,58,237,0.1); }
    .shimmer-text { background: linear-gradient(90deg, #1A1A1A 0%, #D4AF37 50%, #1A1A1A 100%); background-size: 200% auto; -webkit-background-clip: text; -webkit-text-fill-color: transparent; animation: shimmer 3s linear infinite; }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
    @keyframes pulse-glow { 0%,100% { opacity: 0.6; } 50% { opacity: 1; } }
    .float-anim { animation: float 6s ease-in-out infinite; }
    .pulse-glow { animation: pulse-glow 3s ease-in-out infinite; }
    .particle { position: absolute; border-radius: 50%; pointer-events: none; animation: float 6s ease-in-out infinite; }
  </style>
</head>
<body class="h-screen w-full overflow-hidden flex flex-col">

  <!-- Main (full width, no sidebar) -->
  <div class="flex-1 flex flex-col h-full relative">

    <!-- Background particles -->
    <div class="fixed inset-0 pointer-events-none overflow-hidden z-0">
      <div class="particle w-2 h-2 bg-[rgba(212,175,55,0.15)] top-[10%] left-[20%]" style="animation-delay:0s"></div>
      <div class="particle w-3 h-3 bg-[rgba(124,58,237,0.12)] top-[30%] left-[70%]" style="animation-delay:2s"></div>
      <div class="particle w-2 h-2 bg-[rgba(230,199,125,0.1)] top-[60%] left-[40%]" style="animation-delay:4s"></div>
      <div class="particle w-4 h-4 bg-[rgba(212,175,55,0.1)] top-[80%] left-[80%]" style="animation-delay:1s"></div>
      <div class="particle w-2 h-2 bg-[rgba(124,58,237,0.08)] top-[15%] left-[85%]" style="animation-delay:3s"></div>
    </div>

    <!-- Floating New Chat Button (kanan bawah) -->
    <button class="fixed bottom-6 right-6 z-40 w-14 h-14 rounded-full bg-[#7C3AED] text-white shadow-xl flex items-center justify-center hover:bg-[#7C3AED]/90 transition-colors duration-300 group" title="New Chat">
      <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
      <span class="absolute -top-1 -right-1 w-3.5 h-3.5 rounded-full bg-[#D4AF37] border-2 border-white animate-pulse"></span>
    </button>

    <!-- Header -->
    <header class="sticky top-0 z-30 bg-white/80 backdrop-blur-xl border-b border-[#D4AF37]/10 shadow-sm px-4 md:px-6 py-3 flex items-center justify-between">
      <div class="flex items-center gap-3">
        <button class="p-2 rounded-lg hover:bg-[#F8F8F8] text-gray-600 hover:text-[#D4AF37] transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path></svg>
        </button>
        <div class="w-8 h-8 rounded-lg bg-[#1A1A1A] flex items-center justify-center">
          <svg class="w-4 h-4 text-[#D4AF37]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
        </div>
        <h1 class="text-lg font-semibold text-[#1A1A1A] tracking-tight">Izusu ai</h1>
      </div>
      <div class="flex items-center gap-3">
        <!-- AI Mode Selector -->
        <div class="flex items-center gap-2 px-4 py-2 rounded-full bg-white border border-[#D4AF37]/30 shadow-sm cursor-pointer">
          <span class="w-2 h-2 rounded-full bg-emerald-500"></span>
          <span class="text-sm font-medium text-[#1A1A1A]">ChatGPT</span>
          <svg class="w-4 h-4 text-gray-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path></svg>
        </div>
        <!-- History Button (di header, tidak mengambang) -->
        <button class="p-2 rounded-lg hover:bg-[#F8F8F8] text-gray-600 hover:text-[#7C3AED] transition-colors" title="History">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
        </button>
        <!-- Settings Button -->
        <button class="p-2 rounded-lg hover:bg-[#F8F8F8] text-gray-600 hover:text-[#7C3AED] transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path></svg>
        </button>
      </div>
    </header>

    <!-- Main Content -->
    <main class="flex-1 overflow-y-auto relative z-10">
      <div class="flex flex-col items-center justify-center min-h-[60vh] px-4">

        <!-- Avatar with updated URL -->
        <div class="relative flex flex-col items-center justify-center py-8">
          <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="w-64 h-64 rounded-full bg-[#7C3AED]/10 blur-3xl pulse-glow"></div>
          </div>
          <div class="absolute inset-0 flex items-center justify-center pointer-events-none">
            <div class="w-48 h-48 rounded-full bg-[#D4AF37]/10 blur-2xl"></div>
          </div>
          <div class="relative">
            <div class="absolute -inset-3 rounded-full border border-[#D4AF37]/30"></div>
            <div class="absolute -inset-1.5 rounded-full border border-[#D4AF37]/20"></div>
            <div class="absolute -inset-2 rounded-full bg-[#D4AF37]/20 blur-xl"></div>
            <div class="absolute -inset-1 rounded-full bg-[#E6C77D]/10 blur-lg"></div>
            <div class="absolute -inset-4 rounded-full bg-[#7C3AED]/5 blur-2xl"></div>
            <div class="relative w-32 h-32 md:w-40 md:h-40 rounded-full overflow-hidden border-2 border-[#D4AF37]/40 shadow-lg shadow-[#D4AF37]/20 float-anim">
              <img src="https://files.catbox.moe/5p0ct8.jpg" alt="Izusu ai Avatar" class="w-full h-full object-cover">
            </div>
            <div class="absolute bottom-2 right-2 w-4 h-4 rounded-full bg-emerald-500 border-2 border-white shadow-sm"></div>
          </div>
          <div class="mt-6 text-center">
            <h2 class="text-xl md:text-2xl font-semibold text-[#1A1A1A] tracking-tight">Izusu ai</h2>
            <p class="mt-2 text-sm md:text-base text-gray-500 max-w-md px-4">Is there anything you want to do? Just say it.</p>
          </div>
        </div>

        <!-- Suggestions -->
        <div class="w-full max-w-2xl mt-10">
          <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 gap-3">
            <button class="flex items-center gap-3 p-4 rounded-xl bg-white border border-[#D4AF37]/10 hover:border-[#D4AF37]/30 hover:shadow-md transition-all duration-300 text-left hover:-translate-y-0.5">
              <div class="w-8 h-8 rounded-lg bg-[#F8F8F8] flex items-center justify-center shrink-0">
                <svg class="w-4 h-4 text-[#7C3AED]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 10h.01M12 10h.01M16 10h.01M9 16H5a2 2 0 01-2-2V6a2 2 0 012-2h14a2 2 0 012 2v8a2 2 0 01-2 2h-5l-5 5v-5z"></path></svg>
              </div>
              <span class="text-sm text-[#1A1A1A] font-medium">General chat</span>
            </button>
            <button class="flex items-center gap-3 p-4 rounded-xl bg-white border border-[#D4AF37]/10 hover:border-[#D4AF37]/30 hover:shadow-md transition-all duration-300 text-left hover:-translate-y-0.5">
              <div class="w-8 h-8 rounded-lg bg-[#F8F8F8] flex items-center justify-center shrink-0">
                <svg class="w-4 h-4 text-[#7C3AED]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
              </div>
              <span class="text-sm text-[#1A1A1A] font-medium">Describe an image</span>
            </button>
            <button class="flex items-center gap-3 p-4 rounded-xl bg-white border border-[#D4AF37]/10 hover:border-[#D4AF37]/30 hover:shadow-md transition-all duration-300 text-left hover:-translate-y-0.5">
              <div class="w-8 h-8 rounded-lg bg-[#F8F8F8] flex items-center justify-center shrink-0">
                <svg class="w-4 h-4 text-[#7C3AED]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"></path></svg>
              </div>
              <span class="text-sm text-[#1A1A1A] font-medium">Summarize text</span>
            </button>
            <button class="flex items-center gap-3 p-4 rounded-xl bg-white border border-[#D4AF37]/10 hover:border-[#D4AF37]/30 hover:shadow-md transition-all duration-300 text-left hover:-translate-y-0.5">
              <div class="w-8 h-8 rounded-lg bg-[#F8F8F8] flex items-center justify-center shrink-0">
                <svg class="w-4 h-4 text-[#7C3AED]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 20l4-16m4 4l4 4-4 4M6 16l-4-4 4-4"></path></svg>
              </div>
              <span class="text-sm text-[#1A1A1A] font-medium">Write code</span>
            </button>
            <button class="flex items-center gap-3 p-4 rounded-xl bg-white border border-[#D4AF37]/10 hover:border-[#D4AF37]/30 hover:shadow-md transition-all duration-300 text-left hover:-translate-y-0.5">
              <div class="w-8 h-8 rounded-lg bg-[#F8F8F8] flex items-center justify-center shrink-0">
                <svg class="w-4 h-4 text-[#7C3AED]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15.232 5.232l3.536 3.536m-2.036-5.036a2.5 2.5 0 113.536 3.536L6.5 21.036H3v-3.572L16.732 3.732z"></path></svg>
              </div>
              <span class="text-sm text-[#1A1A1A] font-medium">Creative writing</span>
            </button>
            <button class="flex items-center gap-3 p-4 rounded-xl bg-white border border-[#D4AF37]/10 hover:border-[#D4AF37]/30 hover:shadow-md transition-all duration-300 text-left hover:-translate-y-0.5">
              <div class="w-8 h-8 rounded-lg bg-[#F8F8F8] flex items-center justify-center shrink-0">
                <svg class="w-4 h-4 text-[#7C3AED]" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
              </div>
              <span class="text-sm text-[#1A1A1A] font-medium">Brainstorm ideas</span>
            </button>
          </div>
        </div>
      </div>
    </main>

    <!-- Input -->
    <div class="border-t border-[#D4AF37]/10 bg-white/80 backdrop-blur-xl p-4 relative z-10">
      <div class="max-w-3xl mx-auto">
        <div class="relative bg-[#F8F8F8] rounded-2xl border border-[#D4AF37]/10 focus-within:border-[#D4AF37]/30 focus-within:shadow-md transition-all duration-300">
          <div class="flex items-end gap-2 p-3">
            <button class="p-2 rounded-lg hover:bg-[#F8F8F8] text-gray-400 hover:text-[#7C3AED] transition-all">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-8l-4-4m0 0L8 8m4-4v12"></path></svg>
            </button>
            <div class="flex-1 min-w-0">
              <textarea rows="1" placeholder="Is there anything you want to do? Just say it." class="w-full bg-transparent resize-none outline-none text-sm text-[#1A1A1A] placeholder:text-gray-400 py-2 max-h-[200px]"></textarea>
            </div>
            <div class="flex items-center gap-1 shrink-0">
              <button class="p-2 rounded-lg hover:bg-[#F8F8F8] text-gray-400 hover:text-red-500 transition-colors">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
              </button>
              <button class="p-2 rounded-lg bg-[#1A1A1A] text-white hover:bg-[#1A1A1A]/90 transition-all shadow-md hover:shadow-lg">
                <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 19l9 2-9-18-9 18 9-2zm0 0v-8"></path></svg>
              </button>
            </div>
          </div>
        </div>
        <p class="text-center text-[10px] text-gray-400 mt-2">Izusu ai can make mistakes. Please verify important information.</p>
      </div>
    </div>
  </div>
</body>
</html>
